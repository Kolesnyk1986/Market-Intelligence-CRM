<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111318; --surface2: #181c24; --border: #1e2430;
    --accent: #f0a500; --accent2: #e05c1a; --green: #22c55e; --red: #ef4444;
    --text: #e8eaf0; --muted: #6b7280;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(240,165,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,165,0,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 20px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text h1 { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .logo-text span { font-family:var(--font-mono); font-size:11px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

  .lang-switch { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
  .lang-btn { background:transparent; border:none; border-radius:6px; padding:5px 12px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); transition:all 0.2s; }
  .lang-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }
  .lang-btn:hover:not(.active) { color:var(--text); }

  .status-bar { display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .dot-live { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .api-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .api-label { font-family:var(--font-mono); font-size:12px; color:var(--accent); white-space:nowrap; }
  .api-input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-family:var(--font-mono); font-size:13px; outline:none; transition:border-color 0.2s; }
  .api-input:focus { border-color:var(--accent); }
  .api-save { background:var(--accent); color:#000; border:none; border-radius:8px; padding:8px 16px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .api-save:hover { opacity:0.85; }

  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); padding:6px; border-radius:12px; border:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:1; min-width:fit-content; padding:10px 16px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:var(--font-display); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:7px; }
  .tab:hover { color:var(--text); background:var(--surface2); }
  .tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }

  .panel { display:none; } .panel.active { display:block; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
  .card-title { font-size:14px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

  .scan-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media(max-width:600px){ .scan-grid { grid-template-columns:1fr; } .calc-grid { grid-template-columns:1fr 1fr !important; } }
  .form-group label { display:block; font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .form-select,.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; transition:border-color 0.2s; appearance:none; }
  .form-select:focus,.form-input:focus { border-color:var(--accent); }
  .form-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; resize:vertical; min-height:80px; }
  .form-textarea:focus { border-color:var(--accent); }

  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; border:none; border-radius:10px; padding:13px 28px; font-family:var(--font-display); font-size:14px; font-weight:800; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(240,165,0,0.25); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .quick-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--muted); }
  .chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(240,165,0,0.08); }

  .response-area { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:20px; min-height:120px; font-size:13px; line-height:1.7; color:var(--text); display:none; }
  .response-area.visible { display:block; }
  .response-area.loading { display:flex; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .response-content { font-family:var(--font-display); font-size:14px; line-height:1.8; }
  .response-content h2 { color:var(--text); font-size:17px; margin:20px 0 10px; }
  .response-content h3 { color:var(--accent); font-size:15px; margin:16px 0 8px; }
  .response-content strong { color:var(--accent); }
  .response-content ul { padding-left:20px; margin:8px 0; }
  .response-content li { margin:4px 0; }
  .response-content p { margin:8px 0; }

  .calc-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .calc-result { background:linear-gradient(135deg,rgba(240,165,0,0.1),rgba(224,92,26,0.1)); border:1px solid rgba(240,165,0,0.3); border-radius:10px; padding:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
  .calc-item { text-align:center; }
  .calc-val { font-size:20px; font-weight:800; }
  .calc-val.positive{color:var(--green)} .calc-val.negative{color:var(--red)} .calc-val.neutral{color:var(--accent)}
  .calc-key { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-top:4px; }

  .notify { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); border-radius:10px; padding:12px 20px; font-size:13px; font-weight:600; color:var(--accent); z-index:1000; transform:translateY(80px); opacity:0; transition:all 0.3s ease; }
  .notify.show { transform:translateY(0); opacity:1; }
  ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1 data-i18n="title"></h1>
        <span data-i18n="subtitle"></span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-switch">
        <button class="lang-btn" id="btn-uk" onclick="setLang('uk')">🇺🇦 УКР</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇺🇸 ENG</button>
      </div>
      <div class="status-bar">
        <div class="dot-live"></div>
        <span id="statusText"></span>
      </div>
    </div>
  </header>

  <div class="api-section">
    <span class="api-label">🔑 API</span>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-..." />
    <button class="api-save" onclick="saveKey()" data-i18n="saveKey"></button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)"><span>🔥</span><span data-i18n="tab1"></span></button>
    <button class="tab" onclick="switchTab('niche',this)"><span>🎯</span><span data-i18n="tab2"></span></button>
    <button class="tab" onclick="switchTab('compare',this)"><span>🆚</span><span data-i18n="tab3"></span></button>
    <button class="tab" onclick="switchTab('profit',this)"><span>💰</span><span data-i18n="tab4"></span></button>
    <button class="tab" onclick="switchTab('supplier',this)"><span>📦</span><span data-i18n="tab5"></span></button>
  </div>

  <!-- Trend Scanner -->
  <div class="panel active" id="panel-scan">
    <div class="card">
      <div class="card-title">🔥 <span data-i18n="scan_title"></span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;" data-i18n="scan_desc"></p>
      <div class="scan-grid">
        <div class="form-group">
          <label data-i18n="lbl_market"></label>
          <select class="form-select" id="scanMarket">
            <option value="both" data-i18n="mkt_both"></option>
            <option value="usa" data-i18n="mkt_usa"></option>
            <option value="canada" data-i18n="mkt_ca"></option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="lbl_category"></label>
          <select class="form-select" id="scanCategory">
            <option value="all" data-i18n="cat_all"></option>
            <option value="health" data-i18n="cat_health"></option>
            <option value="home" data-i18n="cat_home"></option>
            <option value="pets" data-i18n="cat_pets"></option>
            <option value="sports" data-i18n="cat_sports"></option>
            <option value="baby" data-i18n="cat_baby"></option>
            <option value="auto" data-i18n="cat_auto"></option>
            <option value="beauty" data-i18n="cat_beauty"></option>
            <option value="toys" data-i18n="cat_toys"></option>
            <option value="garden" data-i18n="cat_garden"></option>
            <option value="tools" data-i18n="cat_tools"></option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label data-i18n="lbl_budget"></label>
        <select class="form-select" id="scanBudget">
          <option value="1000-5000">$1,000 – $5,000</option>
          <option value="500-1000">$500 – $1,000</option>
          <option value="5000+">$5,000+</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;" data-i18n="quick_label"></div>
        <div class="quick-chips">
          <span class="chip" onclick="quickScan('top trending products Amazon USA Canada 2026')" data-i18n="chip1"></span>
          <span class="chip" onclick="quickScan('best selling products under $50 Amazon USA 2026')" data-i18n="chip2"></span>
          <span class="chip" onclick="quickScan('low competition high demand Amazon FBA 2026')" data-i18n="chip3"></span>
          <span class="chip" onclick="quickScan('seasonal products Amazon Canada spring summer 2026')" data-i18n="chip4"></span>
          <span class="chip" onclick="quickScan('Amazon Canada top selling categories 2026')" data-i18n="chip5"></span>
        </div>
      </div>
      <button class="btn-primary" id="scanBtn" onclick="runScan()">📡 <span data-i18n="btn_scan"></span></button>
    </div>
    <div class="response-area" id="scan-response"></div>
  </div>

  <!-- Niche Analyzer -->
  <div class="panel" id="panel-niche">
    <div class="card">
      <div class="card-title">🎯 <span data-i18n="niche_title"></span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;" data-i18n="niche_desc"></p>
      <div class="form-group" style="margin-bottom:12px;">
        <label data-i18n="lbl_niche_input"></label>
        <input type="text" class="form-input" id="nicheInput" data-i18n-ph="ph_niche" />
      </div>
      <div class="scan-grid" style="margin-bottom:16px;">
        <div class="form-group">
          <label data-i18n="lbl_market"></label>
          <select class="form-select" id="nicheMarket">
            <option value="both" data-i18n="mkt_both"></option>
            <option value="usa" data-i18n="mkt_usa_s"></option>
            <option value="canada" data-i18n="mkt_ca_s"></option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="lbl_model"></label>
          <select class="form-select" id="nicheModel">
            <option value="wholesale">Wholesale</option>
            <option value="arbitrage">Retail / Online Arbitrage</option>
            <option value="private_label">Private Label</option>
            <option value="any" data-i18n="model_any"></option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="nicheBtn" onclick="analyzeNiche()">🔍 <span data-i18n="btn_niche"></span></button>
    </div>
    <div class="response-area" id="niche-response"></div>
  </div>

  <!-- USA vs Canada -->
  <div class="panel" id="panel-compare">
    <div class="card">
      <div class="card-title">🆚 <span data-i18n="cmp_title"></span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;" data-i18n="cmp_desc"></p>
      <div class="form-group" style="margin-bottom:12px;">
        <label data-i18n="lbl_cmp_input"></label>
        <input type="text" class="form-input" id="compareInput" data-i18n-ph="ph_compare" />
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label data-i18n="lbl_budget"></label>
        <select class="form-select" id="compareBudget">
          <option value="1000-5000">$1,000 – $5,000</option>
          <option value="500-1000">$500 – $1,000</option>
          <option value="5000+">$5,000+</option>
        </select>
      </div>
      <button class="btn-primary" id="compareBtn" onclick="runCompare()">🆚 <span data-i18n="btn_compare"></span></button>
    </div>
    <div class="response-area" id="compare-response"></div>
  </div>

  <!-- Profit Calculator -->
  <div class="panel" id="panel-profit">
    <div class="card">
      <div class="card-title">💰 <span data-i18n="calc_title"></span></div>
      <div class="calc-grid">
        <div class="form-group"><label data-i18n="lbl_buy"></label><input type="number" class="form-input" id="buyPrice" placeholder="8.50" oninput="calcProfit()"/></div>
        <div class="form-group"><label data-i18n="lbl_sell"></label><input type="number" class="form-input" id="sellPrice" placeholder="24.99" oninput="calcProfit()"/></div>
        <div class="form-group"><label data-i18n="lbl_fba"></label><input type="number" class="form-input" id="fbaFee" placeholder="4.50" oninput="calcProfit()"/></div>
        <div class="form-group"><label data-i18n="lbl_ref"></label><input type="number" class="form-input" id="refFee" placeholder="15" oninput="calcProfit()"/></div>
        <div class="form-group"><label data-i18n="lbl_ppc"></label><input type="number" class="form-input" id="ppcFee" placeholder="1.50" oninput="calcProfit()"/></div>
        <div class="form-group"><label data-i18n="lbl_units"></label><input type="number" class="form-input" id="units" placeholder="50" oninput="calcProfit()"/></div>
      </div>
      <div class="calc-result">
        <div class="calc-item"><div class="calc-val neutral" id="res-revenue">—</div><div class="calc-key" data-i18n="res_revenue"></div></div>
        <div class="calc-item"><div class="calc-val neutral" id="res-profit">—</div><div class="calc-key" data-i18n="res_profit"></div></div>
        <div class="calc-item"><div class="calc-val neutral" id="res-margin">—</div><div class="calc-key" data-i18n="res_margin"></div></div>
        <div class="calc-item"><div class="calc-val neutral" id="res-roi">—</div><div class="calc-key">ROI</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🤖 <span data-i18n="ai_profit_title"></span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;" data-i18n="ai_profit_desc"></p>
      <div class="form-group" style="margin-bottom:14px;">
        <label data-i18n="lbl_prod_desc"></label>
        <textarea class="form-textarea" id="profitDesc" data-i18n-ph="ph_profit"></textarea>
      </div>
      <button class="btn-primary" id="profitBtn" onclick="aiProfitCheck()">🤖 <span data-i18n="btn_ai_estimate"></span></button>
    </div>
    <div class="response-area" id="profit-response"></div>
  </div>

  <!-- Supplier Finder -->
  <div class="panel" id="panel-supplier">
    <div class="card">
      <div class="card-title">📦 <span data-i18n="sup_title"></span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;" data-i18n="sup_desc"></p>
      <div class="form-group" style="margin-bottom:12px;">
        <label data-i18n="lbl_sup_input"></label>
        <input type="text" class="form-input" id="supplierInput" data-i18n-ph="ph_supplier"/>
      </div>
      <div class="scan-grid" style="margin-bottom:16px;">
        <div class="form-group">
          <label data-i18n="lbl_source_model"></label>
          <select class="form-select" id="sourcingModel">
            <option value="wholesale" data-i18n="src_wholesale"></option>
            <option value="alibaba">Alibaba / China</option>
            <option value="arbitrage" data-i18n="src_arbitrage"></option>
            <option value="all" data-i18n="src_all"></option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="lbl_min_budget"></label>
          <select class="form-select" id="supplierBudget">
            <option value="1000-5000">$1,000 – $5,000</option>
            <option value="under-1000" data-i18n="bud_under"></option>
            <option value="5000+">$5,000+</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="supplierBtn" onclick="findSuppliers()">🔎 <span data-i18n="btn_supplier"></span></button>
    </div>
    <div class="response-area" id="supplier-response"></div>
  </div>

</div>
<div class="notify" id="notify"></div>

<script>
const T = {
  uk: {
    title:'Машина ринкової розвідки', subtitle:'Amazon США & Канада · На базі ШІ',
    s_ready:'Готово', s_scan:'🔍 Сканування...', s_done:'✅ Готово', s_err:'❌ Помилка',
    saveKey:'Зберегти ключ',
    tab1:'Сканер трендів', tab2:'Аналіз ніші', tab3:'США vs Канада', tab4:'Калькулятор прибутку', tab5:'Постачальники',
    scan_title:'Сканер трендів у реальному часі',
    scan_desc:'ШІ сканує інтернет прямо зараз і знаходить товари, які найкраще продаються на Amazon.',
    niche_title:'Аналіз ніші',
    niche_desc:'Введи будь-яку нішу — ШІ проаналізує попит, конкуренцію, потенціал прибутку і стратегію входу.',
    cmp_title:'Порівняння США vs Канада',
    cmp_desc:'Порівняй будь-який товар на обох маркетплейсах — конкуренція, ціни, попит і куди заходити першою.',
    calc_title:'Калькулятор прибутку FBA',
    ai_profit_title:'AI Перевірка прибутку',
    ai_profit_desc:'Опиши товар — ШІ розрахує FBA комісії та прибутковість за тебе.',
    sup_title:'Пошук постачальників',
    sup_desc:'ШІ знаходить найкращі варіанти постачання — оптовики, Alibaba, місцеві постачальники США/CA.',
    lbl_market:'Маркетплейс', lbl_category:'Категорія (необов\'язково)', lbl_budget:'Бюджет',
    lbl_niche_input:'Ніша або ідея товару', lbl_model:'Модель роботи',
    lbl_cmp_input:'Товар або категорія',
    lbl_buy:'Ціна закупівлі ($)', lbl_sell:'Ціна продажу ($)', lbl_fba:'FBA Комісія ($)',
    lbl_ref:'Реферальна комісія (%)', lbl_ppc:'PPC / Реклама ($)', lbl_units:'Одиниць / місяць',

let LANG = localStorage.getItem('mim_lang') || 'uk';
let API_KEY = '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';

function t(k){ return T[LANG][k] || T.en[k] || k; }

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.getElementById('statusText').textContent = t('s_ready');
  document.getElementById('btn-uk').classList.toggle('active', LANG==='uk');
  document.getElementById('btn-en').classList.toggle('active', LANG==='en');
}

function setLang(lang){ LANG=lang; localStorage.setItem('mim_lang',lang); applyTranslations(); }

window.onload = () => {
  applyTranslations();
  const saved = localStorage.getItem('mim_api_key');
  if(saved){ API_KEY=saved; document.getElementById('apiKey').value=saved; }
  else { document.getElementById('apiKey').value=API_KEY; }
  showNotify(t('n_loaded'));
};

function saveKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(!k){showNotify(t('n_empty'));return;}
  API_KEY=k; localStorage.setItem('mim_api_key',k); showNotify(t('n_saved'));
}

function showNotify(msg){
  const n=document.getElementById('notify'); n.textContent=msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3000);
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function setStatus(k){ document.getElementById('statusText').textContent=t(k); }

function sys(){
  return `You are a professional Amazon FBA market analyst with access to real-time web data.
Always search the web for the most current data before responding.
Format your response clearly with sections and emojis.
CRITICAL: Always respond in ${t('ai_lang')} language only.`;
}

async function callAI(prompt, resId, btnId){
  if(!API_KEY){showNotify(t('n_empty'));return;}
  const btn=document.getElementById(btnId), res=document.getElementById(resId);
  btn.disabled=true; setStatus('s_scan');
  res.className='response-area visible loading';
  res.innerHTML=`<div class="spinner"></div><span>${t('loading')}</span>`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:sys(),messages:[{role:'user',content:prompt}]})
    });
    const data=await r.json();
    if(data.error) throw new Error(data.error.message);
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    res.className='response-area visible';
    res.innerHTML='<div class="response-content">'+fmt(text)+'</div>';
    setStatus('s_done');
  }catch(e){
    res.className='response-area visible';
    res.innerHTML=`<span style="color:var(--red)">❌ ${e.message}</span>`;
    setStatus('s_err');
  }finally{ btn.disabled=false; }
}

function fmt(text){
  return text
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>');
}

Budget: ${budget}. Established 10-year Amazon account seller.

2. For each: demand level, competition, buy price, sell price, margin

}

function calcProfit(){
  const buy=parseFloat(document.getElementById('buyPrice').value)||0;
  const sell=parseFloat(document.getElementById('sellPrice').value)||0;
  const fba=parseFloat(document.getElementById('fbaFee').value)||0;
  const ref=parseFloat(document.getElementById('refFee').value)||15;
  const ppc=parseFloat(document.getElementById('ppcFee').value)||0;
  const units=parseFloat(document.getElementById('units').value)||0;
  if(!sell) return;
  const refAmt=sell*(ref/100);
  const ppu=sell-buy-fba-refAmt-ppc;
  const margin=((ppu/sell)*100).toFixed(1);
  const roi=buy>0?((ppu/buy)*100).toFixed(1):0;
  const sv=(id,val,cls)=>{ const e=document.getElementById(id); e.textContent=val; e.className='calc-val '+cls; };
  sv('res-revenue',`$${(sell*units).toFixed(2)}`,'neutral');
  const mp=(ppu*units).toFixed(2);
  sv('res-profit',`$${mp}`,parseFloat(mp)>0?'positive':'negative');
  sv('res-margin',`${margin}%`,parseFloat(margin)>=20?'positive':parseFloat(margin)>0?'neutral':'negative');
  sv('res-roi',`${roi}%`,parseFloat(roi)>=30?'positive':parseFloat(roi)>0?'neutral':'negative');
}
