<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --surface2: #eef0f4; --border: #dde1e8;
    --accent: #e85d04; --accent2: #dc2f02; --green: #16a34a; --red: #dc2626;
    --text: #1a1d23; --muted: #6b7280; --text-light: #4b5563;
    --font-display: 'Plus Jakarta Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 20% 0%, rgba(232,93,4,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(220,47,2,0.03) 0%, transparent 60%); pointer-events:none; z-index:0; }
  .app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 20px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:2px solid var(--border); flex-wrap:wrap; gap:12px; }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow: var(--shadow-md); }
  .logo-text h1 { font-size:18px; font-weight:800; letter-spacing:-0.5px; color:var(--text); }
  .logo-text span { font-family:var(--font-mono); font-size:11px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

  .lang-switch { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
  .lang-btn { background:transparent; border:none; border-radius:6px; padding:5px 12px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); transition:all 0.2s; }
  .lang-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .lang-btn:hover:not(.active) { color:var(--text); }

  .status-bar { display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .dot-live { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .api-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; box-shadow:var(--shadow-sm); }
  .api-label { font-family:var(--font-mono); font-size:12px; color:var(--accent); white-space:nowrap; font-weight:600; }
  .api-input { flex:1; min-width:200px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-family:var(--font-mono); font-size:13px; outline:none; transition:border-color 0.2s; }
  .api-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,93,4,0.1); }
  .api-save { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .api-save:hover { opacity:0.85; box-shadow:var(--shadow-sm); }

  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); padding:6px; border-radius:12px; border:1px solid var(--border); overflow-x:auto; scrollbar-width:none; box-shadow:var(--shadow-sm); }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:1; min-width:fit-content; padding:10px 16px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:var(--font-display); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:7px; }
  .tab:hover { color:var(--text); background:var(--surface2); }
  .tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:var(--shadow-sm); }

  .panel { display:none; } .panel.active { display:block; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; box-shadow:var(--shadow-sm); }
  .card-title { font-size:14px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

  .scan-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media(max-width:600px){ .scan-grid { grid-template-columns:1fr; } .calc-grid { grid-template-columns:1fr 1fr !important; } }
  .form-group label { display:block; font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .form-select,.form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; transition:border-color 0.2s; appearance:none; }
  .form-select:focus,.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,93,4,0.1); }
  .form-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; resize:vertical; min-height:80px; }
  .form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,93,4,0.1); }

  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; border-radius:10px; padding:13px 28px; font-family:var(--font-display); font-size:14px; font-weight:800; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; box-shadow:var(--shadow-md); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(232,93,4,0.25); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .quick-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .chip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--text-light); box-shadow:var(--shadow-sm); }
  .chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(232,93,4,0.06); }

  .response-area { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; min-height:120px; font-size:13px; line-height:1.7; color:var(--text); display:none; box-shadow:var(--shadow-sm); }
  .response-area.visible { display:block; }
  .response-area.loading { display:flex; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .response-content { font-family:var(--font-display); font-size:14px; line-height:1.8; }
  .response-content h2 { color:var(--text); font-size:17px; margin:20px 0 10px; }
  .response-content h3 { color:var(--accent); font-size:15px; margin:16px 0 8px; }
  .response-content strong { color:var(--accent2); }
  .response-content ul { padding-left:20px; margin:8px 0; }
  .response-content li { margin:4px 0; }
  .response-content p { margin:8px 0; }
  .response-content a { color:var(--accent); text-decoration:underline; }
  .response-content a:hover { color:var(--accent2); }

  .calc-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .calc-result { background:linear-gradient(135deg,rgba(240,165,0,0.1),rgba(224,92,26,0.1)); border:1px solid rgba(240,165,0,0.3); border-radius:10px; padding:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
  .calc-item { text-align:center; }
  .calc-val { font-size:20px; font-weight:800; }
  .calc-val.positive{color:var(--green)} .calc-val.negative{color:var(--red)} .calc-val.neutral{color:var(--accent)}
  .calc-key { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-top:4px; }

  .notify { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); border-radius:10px; padding:12px 20px; font-size:13px; font-weight:600; color:var(--accent); z-index:1000; transform:translateY(80px); opacity:0; transition:all 0.3s ease; box-shadow:var(--shadow-lg); }
  .notify.show { transform:translateY(0); opacity:1; }

  .action-bar { display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .action-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-family:var(--font-display); font-size:12px; font-weight:600; cursor:pointer; color:var(--text-light); transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; box-shadow:var(--shadow-sm); }
  .action-btn:hover { border-color:var(--accent); color:var(--accent); }
  .action-btn.copied { border-color:var(--green); color:var(--green); }

  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:10px; cursor:pointer; transition:all 0.2s; box-shadow:var(--shadow-sm); }
  .history-item:hover { border-color:var(--accent); box-shadow:var(--shadow-md); }
  .history-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:6px; }
  .history-type { font-family:var(--font-mono); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; background:rgba(240,165,0,0.1); padding:2px 8px; border-radius:4px; }
  .history-date { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .history-preview { font-size:13px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .history-empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .history-actions { display:flex; gap:8px; margin-bottom:16px; }
  .history-clear { background:transparent; border:1px solid var(--red); border-radius:8px; padding:7px 14px; font-family:var(--font-display); font-size:12px; font-weight:600; cursor:pointer; color:var(--red); transition:all 0.2s; }
  .history-clear:hover { background:rgba(239,68,68,0.1); }
  .history-count { font-family:var(--font-mono); font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }

  .quick-action { display:inline-flex; align-items:center; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; color:var(--accent); transition:all 0.2s; margin:2px 4px 2px 0; }
  .quick-action:hover { background:var(--accent); color:#fff; }

  ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:var(--surface2)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1 data-i18n="title"></h1>
        <span data-i18n="subtitle"></span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-switch">
        <button class="lang-btn" id="btn-uk" onclick="setLang('uk')">🇺🇦 УКР</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇺🇸 ENG</button>
      </div>
      <div class="status-bar">
        <div class="dot-live"></div>
        <span id="statusText"></span>
      </div>
    </div>
  </header>

  <div class="api-section">
    <span class="api-label">🔑 Claude AI</span>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-..." />
    <button class="api-save" onclick="saveKey()" data-i18n="saveKey"></button>
  </div>
  <div class="api-section" style="flex-wrap:wrap;">
    <span class="api-label" style="color:var(--green);">📊 Keepa</span>
    <input type="password" class="api-input" id="keepaKey" placeholder="Keepa API key..." style="flex:1;min-width:180px;" />
    <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:200px;">
      <span style="font-size:10px;color:var(--muted);white-space:nowrap;">PROXY:</span>
      <input type="text" class="api-input" id="keepaProxy" placeholder="https://ваш-worker.workers.dev/keepa/" style="flex:1;font-size:11px;" />
    </div>
    <button class="api-save" onclick="saveKeepaKey()" data-i18n="saveKey"></button>
    <span id="keepaStatus" style="font-family:var(--font-mono);font-size:11px;color:var(--muted);white-space:nowrap;"></span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)"><span>🔥</span><span data-i18n="tab1"></span></button>
    <button class="tab" onclick="switchTab('niche',this)"><span>🎯</span><span data-i18n="tab2"></span></button>
    <button class="tab" onclick="switchTab('supplier',this)"><span>📦</span><span data-i18n="tab3"></span></button>
    <button class="tab" onclick="switchTab('auctions',this)"><span>🏛️</span><span data-i18n="tab4"></span></button>
    <button class="tab" onclick="switchTab('history',this)"><span>📋</span><span data-i18n="tab5"></span></button>
  </div>

  <!-- Trend Scanner -->

      <div class="card-title">🔥 <span data-i18n="scan_title"></span></div>

let LANG = localStorage.getItem('mim_lang') || 'uk';
let API_KEY = '';
let KEEPA_KEY = '';
let KEEPA_PROXY = '';

function t(k){ return T[LANG][k] || T.en[k] || k; }

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.getElementById('statusText').textContent = t('s_ready');
  document.getElementById('btn-uk').classList.toggle('active', LANG==='uk');
  document.getElementById('btn-en').classList.toggle('active', LANG==='en');
}

function setLang(lang){ LANG=lang; localStorage.setItem('mim_lang',lang); applyTranslations(); }

window.onload = () => {
  applyTranslations();
  const saved = localStorage.getItem('mim_api_key');
  if(saved){ API_KEY=saved; document.getElementById('apiKey').value=saved; }
  const keepaSaved = localStorage.getItem('mim_keepa_key');
  if(keepaSaved){ KEEPA_KEY=keepaSaved; document.getElementById('keepaKey').value=keepaSaved; }
  const proxySaved = localStorage.getItem('mim_keepa_proxy');
  if(proxySaved){ KEEPA_PROXY=proxySaved; document.getElementById('keepaProxy').value=proxySaved; }
  updateKeepaStatus(!!keepaSaved);
  updateMainStatus();
  if(saved || keepaSaved) showNotify(t('n_loaded'));
};

function updateMainStatus(){
  const el = document.getElementById('statusText');
  if(API_KEY && KEEPA_KEY){
    el.innerHTML = LANG==='uk'?'✅ Claude + Keepa':'✅ Claude + Keepa';
  } else if(API_KEY){
    el.innerHTML = LANG==='uk'?'🔑 Claude AI':'🔑 Claude AI';
  } else if(KEEPA_KEY){
    el.innerHTML = LANG==='uk'?'📊 Keepa':'📊 Keepa';
  } else {
    el.innerHTML = LANG==='uk'?'⚠️ Немає ключів':'⚠️ No keys';
  }
}

function saveKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(!k){showNotify(t('n_empty'));return;}
  API_KEY=k; localStorage.setItem('mim_api_key',k); updateMainStatus(); showNotify(t('n_saved'));
}

function saveKeepaKey(){
  const k=document.getElementById('keepaKey').value.trim();
  const p=document.getElementById('keepaProxy').value.trim();
  if(!k){showNotify(LANG==='uk'?'⚠️ Введи Keepa API ключ':'⚠️ Enter Keepa API key');return;}
  KEEPA_KEY=k; localStorage.setItem('mim_keepa_key',k);
  // Proxy is optional — save if provided
  if(p){
    KEEPA_PROXY = p.endsWith('/') ? p : p + '/';
    if(!KEEPA_PROXY.endsWith('keepa/')) KEEPA_PROXY = KEEPA_PROXY + (KEEPA_PROXY.endsWith('/') ? 'keepa/' : '/keepa/');
    localStorage.setItem('mim_keepa_proxy', KEEPA_PROXY);
    document.getElementById('keepaProxy').value = KEEPA_PROXY;
  } else {
    KEEPA_PROXY = '';
    localStorage.removeItem('mim_keepa_proxy');
  }
  updateKeepaStatus(true); updateMainStatus();
  showNotify('✅ Keepa ' + t('n_saved'));
}

function updateKeepaStatus(connected){
  const el = document.getElementById('keepaStatus');
  if(KEEPA_KEY && KEEPA_PROXY){
    el.innerHTML = '<span style="color:var(--green);">✅ Keepa + Proxy OK</span>';
  } else if(KEEPA_KEY){
    el.innerHTML = LANG==='uk' 
      ? '<span style="color:var(--accent);">🔑 Ключ OK · <span style="font-size:10px;">⚠️ Proxy потрібен</span></span>' 
      : '<span style="color:var(--accent);">🔑 Key OK · <span style="font-size:10px;">⚠️ Proxy needed</span></span>';
  } else {
    el.innerHTML = '';
  }
}

function showNotify(msg){
  const n=document.getElementById('notify'); n.textContent=msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3000);
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function setStatus(k){ document.getElementById('statusText').textContent=t(k); }

function sys(){
  return `You are an elite market intelligence analyst. You have web search access but NOT direct access to Amazon's database.

HONESTY RULES — THIS IS THE MOST IMPORTANT SECTION:
1. NEVER say a product is a "best seller", "top seller", or "trending" unless you found CURRENT BSR data from Amazon in THIS search session.
2. For EVERY product you mention, you MUST show the DATA SOURCE:
   - ✅ VERIFIED: "BSR #45 in Kitchen (source: Amazon.com, found in search)" — you actually found this data now
   - 📰 FROM ARTICLE: "mentioned as trending in [article name], [date]" — you found it in a blog/article, NOT confirmed on Amazon

   - ❌ NOT FOUND: "BSR not available in current search" — be honest when you can't find data

async function callAI(prompt, resId, btnId, retryCount=0){
  if(!API_KEY){
    // If no Claude key but Keepa available, redirect to Keepa for scan
    if(KEEPA_KEY && resId === 'scan-response'){
      return runScan(); // runScan will use Keepa path
    }
    const res=document.getElementById(resId);
    res.className='response-area visible';
    const keepaHint = KEEPA_KEY 
      ? (LANG==='uk'?'<br>💡 Keepa працює — використай вкладку "Сканер" для пошуку товарів.':'<br>💡 Keepa is active — use the "Scanner" tab for product search.')
      : '';
    res.innerHTML=`<div style="text-align:center;padding:20px;"><p>⚠️ ${LANG==='uk'?'Для цієї функції потрібен Claude AI ключ':'This feature requires Claude AI key'}</p><p style="margin-top:8px;"><a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">console.anthropic.com</a></p>${keepaHint}</div>`;
    return;
  }
  const MAX_RETRIES = 3;
  const btn=document.getElementById(btnId), res=document.getElementById(resId);
  btn.disabled=true; setStatus('s_scan');
  if(retryCount === 0){
    res.className='response-area visible loading';
    res.innerHTML=`<div class="spinner"></div><span>${t('loading')}</span>`;
  }
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 180000);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal: controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8192,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:sys(),messages:[{role:'user',content:prompt}]})
    });
    clearTimeout(timeout);
    const data=await r.json();
    if(data.error){
      const etype = data.error.type || '';
      // Auth error = key invalid or no money
      if(etype === 'authentication_error' || (etype === 'invalid_request_error' && (data.error.message||'').includes('credit'))){
        // If Keepa available, show a useful combined message
        const keepaMsg = KEEPA_KEY 
          ? (LANG==='uk'?'<br><br>💡 <strong>Keepa працює!</strong> Використай вкладку "Сканер" для пошуку товарів з реальними даними.':'<br><br>💡 <strong>Keepa is active!</strong> Use the "Scanner" tab for real product data.')
          : '';
        throw new Error((LANG==='uk'?'🔑 Claude API: ключ невалідний або закінчились кошти.<br><a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">Поповнити на console.anthropic.com</a>':'🔑 Claude API: key invalid or out of credits.<br><a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">Top up at console.anthropic.com</a>') + keepaMsg);
      }
      if((etype === 'rate_limit_error' || etype === 'overloaded_error') && retryCount < MAX_RETRIES){
        const waitSec = etype === 'rate_limit_error' ? 60 : 30;
        await countdown(res, waitSec, retryCount+1, MAX_RETRIES);
        return callAI(prompt, resId, btnId, retryCount+1);
      }
      if(etype === 'rate_limit_error') throw new Error(LANG==='uk'?'⏳ Ліміт запитів перевищено після 3 спроб. Зачекай кілька хвилин.':'⏳ Rate limit exceeded after 3 retries. Wait a few minutes.');
      if(etype === 'overloaded_error') throw new Error(LANG==='uk'?'🔄 API перевантажене після 3 спроб. Спробуй пізніше.':'🔄 API overloaded after 3 retries. Try later.');
      throw new Error(data.error.message);
    }
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    if(!text.trim()) throw new Error(LANG==='uk'?'ШІ не повернув текстової відповіді. Спробуй ще раз.':'AI returned no text response. Try again.');
    const formatted = fmt(text);
    const withActions = addQuickActions(formatted);
    res.className='response-area visible';
    res.innerHTML='<div class="response-content">'+withActions+'</div>' + buildActionBar(resId, text);
    saveToHistory(resId, prompt, text);
    setStatus('s_done');
  }catch(e){
    clearTimeout(timeout);
    res.className='response-area visible';
    const msg = e.name==='AbortError' ? (LANG==='uk'?'⏱️ Час очікування вичерпано. Спробуй ще раз.':'⏱️ Request timed out. Please try again.') : e.message;
    res.innerHTML=`<div style="text-align:center;padding:16px;"><span style="color:var(--red)">${msg}</span></div>`;
    setStatus('s_err');
  }finally{ btn.disabled=false; }
}

function countdown(res, seconds, attempt, maxAttempts){
  return new Promise(resolve => {
    let remaining = seconds;
    const label = LANG==='uk'
      ? `⏳ Ліміт API — автоматичне повторення через`
      : `⏳ API rate limit — auto-retry in`;
    const attemptLabel = LANG==='uk' ? 'Спроба' : 'Attempt';
    const update = () => {
      res.className='response-area visible loading';
      res.innerHTML=`<div class="spinner"></div><span>${label} <strong>${remaining}</strong>с... (${attemptLabel} ${attempt}/${maxAttempts})</span>`;
      if(remaining <= 0){ resolve(); return; }
      remaining--;
      setTimeout(update, 1000);
    };
    update();
  });
}

function fmt(text){
  let html = text
    .replace(/^#### (.+)$/gm,'<h3 style="font-size:14px;">$1</h3>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;font-weight:600;">$1</a>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm,'<li class="ol-item">$1</li>')
    .replace(/\n\n/g,'</p><p>');
  // Group consecutive <li> into <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, (match) => {
    if(!match.includes('ol-item')) return '<ul>' + match + '</ul>';
    return '<ol>' + match.replace(/class="ol-item"/g,'') + '</ol>';
  });
  // Simple table support: | col | col |
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (tableBlock) => {
    const rows = tableBlock.trim().split('\n').filter(r => !r.match(/^\|[\s\-\|]+\|$/));
    if(rows.length < 1) return tableBlock;
    let table = '<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;">';
    rows.forEach((row, i) => {
      const cells = row.split('|').filter(c => c.trim());
      const tag = i===0 ? 'th' : 'td';
      const style = i===0 ? 'style="border-bottom:2px solid var(--accent);padding:8px;text-align:left;color:var(--accent);font-weight:700;"' : 'style="border-bottom:1px solid var(--border);padding:8px;"';
      table += '<tr>' + cells.map(c => `<${tag} ${style}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return table + '</table>';
  });
  return html;
}

function exportCSV(resId){
  const el = document.getElementById(resId);
  const content = el.querySelector('.response-content');
  if(!content) return;
  const lines = content.innerText.split('\n').filter(l=>l.trim());
  let csv = 'Section,Content\n';
  let currentSection = 'General';
  lines.forEach(line => {
    const trimmed = line.trim();
    if(trimmed.match(/^[#🔥🎯🆚💰📦🏠🐾🏋💄🧸👕📱🔧🚗🍎📚🎨🏢🔬🛒📦🏭🛍️🏆✅⚠️📈📊🔗]/)){
      currentSection = trimmed.replace(/^#+\s*/, '').replace(/[#]/g,'');
    } else if(trimmed.length > 5){
      const escaped = trimmed.replace(/"/g,'""');
      const secEscaped = currentSection.replace(/"/g,'""');
      csv += `"${secEscaped}","${escaped}"\n`;
    }
  });
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  const type = resId.replace('-response','');
  a.href = url; a.download = `market-scan-${type}-${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  showNotify('📥 CSV exported!');
}

async function keepaFetch(endpoint, params={}){
  if(!KEEPA_KEY) return { _error: 'no key' };
  
  // Build the canonical Keepa URL (ONE correct URL)
  const keepaUrl = new URL('https://api.keepa.com/' + endpoint);
  keepaUrl.searchParams.set('key', KEEPA_KEY);
  // Only add domain if not already specified AND endpoint needs it
  // bestsellers does NOT accept domain param — it causes 400 error
  if(params.domain === undefined && endpoint !== 'bestsellers'){
    keepaUrl.searchParams.set('domain', '1');
  }
  Object.entries(params).forEach(([k,v]) => keepaUrl.searchParams.set(k, String(v)));
  const directUrl = keepaUrl.toString();
  
  // Helper: try fetch, return parsed JSON or null
  async function tryFetch(url, label){
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
      if(!r.ok){ console.log(label + ' HTTP ' + r.status); return null; }
      const data = await r.json();
      if(data.error){ console.log(label + ' API error:', data.error); return { _error: data.error.message || JSON.stringify(data.error) }; }
      return data;
    } catch(e){
      console.log(label + ' failed:', e.message);
      return null;
    }
  }

  // Try 1: Direct Keepa API
  let result = await tryFetch(directUrl, 'Keepa direct');
  if(result) return result;

  // Try 2: User's proxy if configured
  if(KEEPA_PROXY){
    const proxyUrl = KEEPA_PROXY + endpoint + '?' + keepaUrl.searchParams.toString();
    result = await tryFetch(proxyUrl, 'Keepa proxy');
    if(result) return result;
  }

  // Try 3: Public CORS proxies as last resort
  const proxies = [
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(directUrl),
    'https://thingproxy.freeboard.io/fetch/' + directUrl,
    'https://corsproxy.io/?' + encodeURIComponent(directUrl)
  ];
  for(const proxyUrl of proxies){
    result = await tryFetch(proxyUrl, 'CORS proxy');
    if(result) return result;
  }

  return { _error: LANG==='uk'?'Keepa API недоступна (CORS). Налаштуй проксі або перевір ключ.':'Keepa API unavailable (CORS). Set up proxy or check key.' };
}

async function keepaBestSellers(categoryName){
  const catId = KEEPA_CATEGORIES[categoryName];
  if(!catId) return null;
  // range=0 means current BSR, domain=1 means Amazon.com (USA)
  const data = await keepaFetch('bestsellers', { category: String(catId), range: '0' });
  if(!data || data._error) return null;
  // Response can have asinList directly or inside bestSellersList
  const list = data.asinList || (data.bestSellersList && data.bestSellersList.asinList) || null;
  return list ? list.slice(0,20) : null;
}

async function keepaSearchProducts(searchTerm){
  // Use Keepa's search endpoint (product search by term)
  const data = await keepaFetch('search', { type: 'product', term: searchTerm, page: '0' });
  if(!data || data._error) return null;
  // If search returned ASINs, fetch full product data
  if(data.asinList && data.asinList.length){
    return await keepaProducts(data.asinList.slice(0,10));
  }
  if(data.products && data.products.length) return data.products.slice(0,15);
  return null;
}

async function keepaProducts(asins){
  if(!asins || !asins.length) return null;
  const batch = asins.slice(0,10).join(',');
  // stats=180 gives current prices/BSR in stats.current array
  // rating=1 adds rating and review count to stats.current[16] and [17]
  // history=0 saves tokens — we only need current data, not full price history
  const data = await keepaFetch('product', { asin: batch, stats: '180', history: '0', rating: '1' });
  if(!data || data._error || !data.products) return null;
  // Debug: log first product structure to help diagnose
  if(data.products[0]){
    const p = data.products[0];
    console.log('Keepa product sample:', {
      title: p.title?.substring(0,40),
      asin: p.asin,
      hasStats: !!p.stats,
      statsCurrent: p.stats?.current,
      hasCsv: !!p.csv,
      csvTypes: p.csv ? Object.keys(p.csv).length || p.csv.length : 0,
      rating: p.stats?.current?.[16],
      reviews: p.stats?.current?.[17],
      amazonPrice: p.stats?.current?.[0],
      newPrice: p.stats?.current?.[1],
      salesRank: p.stats?.current?.[3],
      buyBox: p.stats?.current?.[18],
      topLevelRating: p.rating,
      topLevelReviews: p.reviewCount
    });
  }
  return data.products;
}

function keepaPrice(val){ return val != null && val > 0 ? (val/100).toFixed(2) : null; }

// Extract last value from a Keepa csv time-series array [time, val, time, val, ...]
function keepaCsvLast(csvArray){
  if(!csvArray || !Array.isArray(csvArray) || csvArray.length < 2) return null;
  const val = csvArray[csvArray.length - 1]; // last value
  return val > 0 ? val : null;
}

// Get product price in dollars (float) from Keepa product object
function getKeepaProductPrice(p){
  const sc = p.stats && p.stats.current ? p.stats.current : [];
  const raw = sc[0] > 0 ? sc[0] : (sc[1] > 0 ? sc[1] : (sc[18] > 0 ? sc[18] : null));
  if(raw) return raw / 100;
  if(p.csv){
    const csvVal = keepaCsvLast(p.csv[0]) || keepaCsvLast(p.csv[1]);
    if(csvVal) return csvVal / 100;
  }
  return null;
}

// Parse budget string like "$500 - $1,000" into {min, max}
function parseBudget(budget){
  if(!budget || budget === 'any') return null;
  const nums = budget.replace(/[^0-9,.-]/g, ' ').split(/\s+/).map(s => parseFloat(s.replace(/,/g,'')));
  const valid = nums.filter(n => !isNaN(n) && n >= 0);
  if(valid.length >= 2) return { min: Math.min(...valid), max: Math.max(...valid) };
  if(valid.length === 1) return { min: 0, max: valid[0] };
  return null;
}

// Filter products by budget range
function filterByBudget(products, budget){
  const range = parseBudget(budget);
  if(!range) return products; // no filter
  return products.filter(p => {
    const price = getKeepaProductPrice(p);
    if(!price) return true; // include products without price (don't lose data)
    return price >= range.min && price <= range.max;
  });
}

  const budgetLabel = budget && budget !== 'any' ? ` (${budget})` : '';
  let html = `<h2>✅ ${categoryName}${budgetLabel} — ${LANG==='uk'?'Реальні дані Keepa (оновлено зараз)':'Real Keepa data (just updated)'}</h2>`;

  products.forEach((p, i) => {
    if(!p || !p.title) return;
    
    // === PRICE: try stats.current[0] (Amazon), [1] (New), [18] (BuyBox), then csv arrays ===
    const sc = p.stats && p.stats.current ? p.stats.current : [];
    let price = keepaPrice(sc[0]) || keepaPrice(sc[1]) || keepaPrice(sc[18]);
    // Fallback: extract from csv history arrays (last value)
    if(!price && p.csv){
      const csvAmazon = keepaCsvLast(p.csv[0]);
      const csvNew = keepaCsvLast(p.csv[1]);
      price = keepaPrice(csvAmazon) || keepaPrice(csvNew);
    }
    
    // === BSR: stats.current[3], or csv[3] last value, or salesRankReference ===
    let bsr = sc[3] > 0 ? sc[3] : null;
    if(!bsr && p.csv && p.csv[3]){

    if(!bsr && p.salesRank){

      if(ranks.length && ranks[0] > 0) bsr = ranks[0];
    }
    
    // === RATING: stats.current[16] (0-50 scale), or top-level p.rating (0-50 scale) ===
    let ratingRaw = sc[16] > 0 ? sc[16] : (p.rating > 0 ? p.rating : null);
    // Also try csv[16] last value
    if(!ratingRaw && p.csv && p.csv[16]){
      ratingRaw = keepaCsvLast(p.csv[16]);
    }
    const rating = ratingRaw ? (ratingRaw / 10).toFixed(1) : '—';
    
    // === REVIEWS: stats.current[17], or top-level p.reviewCount ===
    let reviews = sc[17] > 0 ? sc[17] : null;
    if(!reviews && p.reviewCount > 0) reviews = p.reviewCount;
    if(!reviews && p.csv && p.csv[17]){
      reviews = keepaCsvLast(p.csv[17]);
    }
    
    const title = p.title.length > 80 ? p.title.substring(0,77)+'...' : p.title;
    
    html += `<tr style="border-bottom:1px solid var(--border);">`;
    html += `<td style="padding:8px;color:var(--accent);font-weight:700;">${i+1}</td>`;
    html += `<td style="padding:8px;"><strong>${title}</strong></td>`;
    html += `<td style="padding:8px;font-family:var(--font-mono);font-size:11px;">${p.asin}</td>`;
    html += `<td style="padding:8px;font-weight:700;color:var(--green);">${bsr ? '#'+bsr.toLocaleString() : '—'}</td>`;
    html += `<td style="padding:8px;font-weight:700;">$${price || '—'}</td>`;
    html += `<td style="padding:8px;">${rating}</td>`;
    html += `<td style="padding:8px;">${reviews ? (typeof reviews === 'number' ? reviews.toLocaleString() : reviews) : '—'}</td>`;
    html += `</tr>`;
  });
  html += '</table>';
  html += `<p style="color:var(--green);font-size:12px;margin-top:8px;">✅ ${LANG==='uk'?'Дані підтверджені Keepa API в реальному часі':'Data verified by Keepa API in real-time'}</p>`;
  return html;
}

// ===== MODIFIED SCAN: KEEPA + CLAUDE HYBRID =====
// Override switchTab to render history when switching to it
const _origSwitchTab = switchTab;
switchTab = function(name, el){
  _origSwitchTab(name, el);
  if(name === 'history') renderHistory();
};
</script>
