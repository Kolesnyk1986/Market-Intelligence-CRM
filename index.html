<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111318; --surface2: #181c24; --border: #1e2430;
    --accent: #f0a500; --accent2: #e05c1a; --green: #22c55e; --red: #ef4444;
    --text: #e8eaf0; --muted: #6b7280;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(240,165,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,165,0,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 20px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text h1 { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .logo-text span { font-family:var(--font-mono); font-size:11px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

  .lang-switch { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
  .lang-btn { background:transparent; border:none; border-radius:6px; padding:5px 12px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); transition:all 0.2s; }
  .lang-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }
  .lang-btn:hover:not(.active) { color:var(--text); }

  .status-bar { display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .dot-live { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .api-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .api-label { font-family:var(--font-mono); font-size:12px; color:var(--accent); white-space:nowrap; }
  .api-input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-family:var(--font-mono); font-size:13px; outline:none; transition:border-color 0.2s; }
  .api-input:focus { border-color:var(--accent); }
  .api-save { background:var(--accent); color:#000; border:none; border-radius:8px; padding:8px 16px; font-family:var(--font-display); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .api-save:hover { opacity:0.85; }

  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); padding:6px; border-radius:12px; border:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:1; min-width:fit-content; padding:10px 16px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:var(--font-display); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:7px; }
  .tab:hover { color:var(--text); background:var(--surface2); }
  .tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }

  .panel { display:none; } .panel.active { display:block; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
  .card-title { font-size:14px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

  .scan-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media(max-width:600px){ .scan-grid { grid-template-columns:1fr; } .calc-grid { grid-template-columns:1fr 1fr !important; } }
  .form-group label { display:block; font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .form-select,.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; transition:border-color 0.2s; appearance:none; }
  .form-select:focus,.form-input:focus { border-color:var(--accent); }
  .form-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:var(--font-display); font-size:14px; outline:none; resize:vertical; min-height:80px; }
  .form-textarea:focus { border-color:var(--accent); }

  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; border:none; border-radius:10px; padding:13px 28px; font-family:var(--font-display); font-size:14px; font-weight:800; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(240,165,0,0.25); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .quick-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--muted); }
  .chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(240,165,0,0.08); }

  .response-area { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:20px; min-height:120px; font-size:13px; line-height:1.7; color:var(--text); display:none; }
  .response-area.visible { display:block; }
  .response-area.loading { display:flex; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .response-content { font-family:var(--font-display); font-size:14px; line-height:1.8; }
  .response-content h2 { color:var(--text); font-size:17px; margin:20px 0 10px; }
  .response-content h3 { color:var(--accent); font-size:15px; margin:16px 0 8px; }
  .response-content strong { color:var(--accent); }
  .response-content ul { padding-left:20px; margin:8px 0; }
  .response-content li { margin:4px 0; }
  .response-content p { margin:8px 0; }

  .calc-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .calc-result { background:linear-gradient(135deg,rgba(240,165,0,0.1),rgba(224,92,26,0.1)); border:1px solid rgba(240,165,0,0.3); border-radius:10px; padding:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
  .calc-item { text-align:center; }
  .calc-val { font-size:20px; font-weight:800; }
  .calc-val.positive{color:var(--green)} .calc-val.negative{color:var(--red)} .calc-val.neutral{color:var(--accent)}
  .calc-key { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-top:4px; }

  .notify { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); border-radius:10px; padding:12px 20px; font-size:13px; font-weight:600; color:var(--accent); z-index:1000; transform:translateY(80px); opacity:0; transition:all 0.3s ease; }
  .notify.show { transform:translateY(0); opacity:1; }

  .action-bar { display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .action-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-family:var(--font-display); font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; }
  .action-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(240,165,0,0.08); }
  .action-btn.copied { border-color:var(--green); color:var(--green); }

  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:10px; cursor:pointer; transition:all 0.2s; }
  .history-item:hover { border-color:var(--accent); }
  .history-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:6px; }
  .history-type { font-family:var(--font-mono); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; background:rgba(240,165,0,0.1); padding:2px 8px; border-radius:4px; }
  .history-date { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .history-preview { font-size:13px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .history-empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .history-actions { display:flex; gap:8px; margin-bottom:16px; }
  .history-clear { background:transparent; border:1px solid var(--red); border-radius:8px; padding:7px 14px; font-family:var(--font-display); font-size:12px; font-weight:600; cursor:pointer; color:var(--red); transition:all 0.2s; }
  .history-clear:hover { background:rgba(239,68,68,0.1); }
  .history-count { font-family:var(--font-mono); font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }

  .quick-action { display:inline-flex; align-items:center; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; color:var(--accent); transition:all 0.2s; margin:2px 4px 2px 0; }
  .quick-action:hover { background:var(--accent); color:#000; }

  ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1 data-i18n="title"></h1>

      <div class="status-bar">

let LANG = localStorage.getItem('mim_lang') || 'uk';
let API_KEY = '';

function t(k){ return T[LANG][k] || T.en[k] || k; }

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.getElementById('statusText').textContent = t('s_ready');
  document.getElementById('btn-uk').classList.toggle('active', LANG==='uk');
  document.getElementById('btn-en').classList.toggle('active', LANG==='en');
}

function setLang(lang){ LANG=lang; localStorage.setItem('mim_lang',lang); applyTranslations(); }

window.onload = () => {
  applyTranslations();
  const saved = localStorage.getItem('mim_api_key');
  if(saved){ API_KEY=saved; document.getElementById('apiKey').value=saved; showNotify(t('n_loaded')); }
  else { document.getElementById('apiKey').setAttribute('placeholder','sk-ant-api03-...'); }
};

function saveKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(!k){showNotify(t('n_empty'));return;}
  API_KEY=k; localStorage.setItem('mim_api_key',k); showNotify(t('n_saved'));
}

function showNotify(msg){
  const n=document.getElementById('notify'); n.textContent=msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3000);
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function setStatus(k){ document.getElementById('statusText').textContent=t(k); }

function sys(){
  return `You are an elite Amazon FBA market intelligence analyst. You have access to real-time web search.

RULES:
1. ALWAYS search the web FIRST before analyzing. Use multiple searches to gather comprehensive data.
2. ALWAYS provide EXACT PRODUCT NAMES as they appear on Amazon listings and Google Shopping.
   WRONG: "silicone kitchen utensils" or "wireless earbuds"
   RIGHT: "Umite Chef 15-Piece Silicone Cooking Utensil Set with Holder" or "JBL Tune 230NC TWS"
3. Search Amazon Best Sellers, Amazon Movers & Shakers, and Google Shopping for real listings.
4. Group products under their Amazon category as a header (e.g. ## 🏠 Home & Kitchen).
5. Under each category, list specific products with their FULL Amazon listing title in **bold**.
6. Include real supplier names and website URLs when recommending sourcing.
7. Format with clear markdown: ## headers, ### sub-headers, **bold** for key data, bullet lists, and tables.
8. CRITICAL: Always respond in ${t('ai_lang')} language only.
9. If data is uncertain, say so — never fabricate product names or prices.`;
}

async function callAI(prompt, resId, btnId){
  if(!API_KEY){showNotify(t('n_empty'));return;}
  const btn=document.getElementById(btnId), res=document.getElementById(resId);
  btn.disabled=true; setStatus('s_scan');
  res.className='response-area visible loading';
  res.innerHTML=`<div class="spinner"></div><span>${t('loading')}</span>`;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 180000);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal: controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:sys(),messages:[{role:'user',content:prompt}]})
    });
    clearTimeout(timeout);
    const data=await r.json();
    if(data.error){
      const etype = data.error.type || '';
      if(etype === 'authentication_error') throw new Error(LANG==='uk'?'🔑 API ключ невалідний або відкликаний. Створи новий ключ на console.anthropic.com':'🔑 API key is invalid or revoked. Create a new key at console.anthropic.com');
      if(etype === 'rate_limit_error') throw new Error(LANG==='uk'?'⏳ Ліміт запитів перевищено. Зачекай 1 хвилину.':'⏳ Rate limit exceeded. Wait 1 minute.');
      if(etype === 'overloaded_error') throw new Error(LANG==='uk'?'🔄 API перевантажене. Спробуй через 30 секунд.':'🔄 API overloaded. Try again in 30 seconds.');
      throw new Error(data.error.message);
    }
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    if(!text.trim()) throw new Error(LANG==='uk'?'ШІ не повернув текстової відповіді. Спробуй ще раз.':'AI returned no text response. Try again.');
    const formatted = fmt(text);
    const withActions = addQuickActions(formatted);
    res.className='response-area visible';
    res.innerHTML='<div class="response-content">'+withActions+'</div>' + buildActionBar(resId, text);
    saveToHistory(resId, prompt, text);
    setStatus('s_done');
  }catch(e){
    clearTimeout(timeout);
    res.className='response-area visible';
    const msg = e.name==='AbortError' ? '⏱️ Request timed out. Please try again.' : e.message;
    res.innerHTML=`<span style="color:var(--red)">❌ ${msg}</span>`;
    setStatus('s_err');
  }finally{ btn.disabled=false; }
}

function fmt(text){
  let html = text
    .replace(/^#### (.+)$/gm,'<h3 style="font-size:14px;">$1</h3>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm,'<li class="ol-item">$1</li>')
    .replace(/\n\n/g,'</p><p>');
  // Group consecutive <li> into <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, (match) => {
    if(!match.includes('ol-item')) return '<ul>' + match + '</ul>';
    return '<ol>' + match.replace(/class="ol-item"/g,'') + '</ol>';
  });
  // Simple table support: | col | col |
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (tableBlock) => {
    const rows = tableBlock.trim().split('\n').filter(r => !r.match(/^\|[\s\-\|]+\|$/));
    if(rows.length < 1) return tableBlock;
    let table = '<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;">';
    rows.forEach((row, i) => {
      const cells = row.split('|').filter(c => c.trim());
      const tag = i===0 ? 'th' : 'td';
      const style = i===0 ? 'style="border-bottom:2px solid var(--accent);padding:8px;text-align:left;color:var(--accent);font-weight:700;"' : 'style="border-bottom:1px solid var(--border);padding:8px;"';
      table += '<tr>' + cells.map(c => `<${tag} ${style}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return table + '</table>';
  });
  return html;
}

function calcProfit(){
  const buy=parseFloat(document.getElementById('buyPrice').value)||0;
  const sell=parseFloat(document.getElementById('sellPrice').value)||0;
  const fba=parseFloat(document.getElementById('fbaFee').value)||0;
  const ref=parseFloat(document.getElementById('refFee').value)||15;
  const ppc=parseFloat(document.getElementById('ppcFee').value)||0;
  const units=parseFloat(document.getElementById('units').value)||0;
  if(!sell) return;
  const sellInput = document.getElementById('sellPrice');
  const buyInput = document.getElementById('buyPrice');
  if(sell < buy){
    sellInput.style.borderColor='var(--red)';
    buyInput.style.borderColor='var(--red)';
  } else {
    sellInput.style.borderColor='';
    buyInput.style.borderColor='';
  }
  const refAmt=sell*(ref/100);
  const ppu=sell-buy-fba-refAmt-ppc;
  const margin=((ppu/sell)*100).toFixed(1);
  const roi=buy>0?((ppu/buy)*100).toFixed(1):null;
  const sv=(id,val,cls)=>{ const e=document.getElementById(id); e.textContent=val; e.className='calc-val '+cls; };
  sv('res-revenue',`$${(sell*units).toFixed(2)}`,'neutral');
  const mp=(ppu*units).toFixed(2);
  sv('res-profit',`$${mp}`,parseFloat(mp)>0?'positive':'negative');
  sv('res-margin',`${margin}%`,parseFloat(margin)>=20?'positive':parseFloat(margin)>0?'neutral':'negative');
  sv('res-roi',roi!==null?`${roi}%`:'N/A',roi!==null?(parseFloat(roi)>=30?'positive':parseFloat(roi)>0?'neutral':'negative'):'neutral');
}

// ===== ACTION BAR: Copy + Export CSV =====
function buildActionBar(resId, rawText){
  const id = resId.replace('-response','');
  return `<div class="action-bar">
    <button class="action-btn" onclick="copyResult('${resId}')" id="copyBtn-${resId}">📋 ${t('act_copy')}</button>
    <button class="action-btn" onclick="exportCSV('${resId}')">📥 ${t('act_csv')}</button>
  </div>`;
}

function copyResult(resId){
  const el = document.getElementById(resId);
  const content = el.querySelector('.response-content');
  if(!content) return;
  const text = content.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyBtn-'+resId);
    if(btn){ btn.textContent='✅ '+t('act_copied'); btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='📋 '+t('act_copy'); btn.classList.remove('copied'); },2000); }
  });
}

function exportCSV(resId){
  const el = document.getElementById(resId);
  const content = el.querySelector('.response-content');
  if(!content) return;
  const lines = content.innerText.split('\n').filter(l=>l.trim());
  let csv = 'Section,Content\n';
  let currentSection = 'General';
  lines.forEach(line => {
    const trimmed = line.trim();
    if(trimmed.match(/^[#🔥🎯🆚💰📦🏠🐾🏋💄🧸👕📱🔧🚗🍎📚🎨🏢🔬🛒📦🏭🛍️🏆✅⚠️📈📊🔗]/)){
      currentSection = trimmed.replace(/^#+\s*/, '').replace(/[#]/g,'');
    } else if(trimmed.length > 5){
      const escaped = trimmed.replace(/"/g,'""');
      const secEscaped = currentSection.replace(/"/g,'""');
      csv += `"${secEscaped}","${escaped}"\n`;
    }
  });
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  const type = resId.replace('-response','');
  a.href = url; a.download = `market-scan-${type}-${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  showNotify('📥 CSV exported!');
}

// ===== HISTORY =====
function getHistory(){ try{ return JSON.parse(localStorage.getItem('mim_history')||'[]'); }catch(e){ return []; } }
function setHistory(h){ localStorage.setItem('mim_history', JSON.stringify(h)); }

const HIST_TYPE_MAP = {
  'scan':'hist_scan', 'niche':'hist_niche', 'compare':'hist_compare',
  'profit':'hist_profit_check', 'supplier':'hist_supplier'
};

function saveToHistory(resId, prompt, text){
  const type = resId.replace('-response','');
  const history = getHistory();
  const preview = text.replace(/[#*\-\n]+/g,' ').trim().substring(0,150);
  history.unshift({
    type: type,
    prompt: prompt.substring(0,200),
    text: text,
    preview: preview,
    date: new Date().toISOString()
  });
  if(history.length > 50) history.length = 50;
  setHistory(history);
}

function renderHistory(){
  const history = getHistory();
  const list = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  count.textContent = history.length;
  if(!history.length){
    list.innerHTML = `<div class="history-empty">${t('hist_empty')}</div>`;
    return;
  }
  list.innerHTML = history.map((item, i) => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const typeKey = HIST_TYPE_MAP[item.type] || item.type;
    return `<div class="history-item" onclick="viewHistoryItem(${i})">
      <div class="history-meta">
        <span class="history-type">${t(typeKey)}</span>
        <span class="history-date">${dateStr}</span>
      </div>
      <div class="history-preview">${item.preview}...</div>
    </div>`;
  }).join('');
}

function viewHistoryItem(index){
  const history = getHistory();
  const item = history[index];
  if(!item) return;
  const typeToPanel = { scan:'scan', niche:'niche', compare:'compare', profit:'profit', supplier:'supplier' };
  const panel = typeToPanel[item.type] || 'scan';
  const tabIndex = ['scan','niche','compare','profit','supplier'].indexOf(panel);
  switchTab(panel, document.querySelectorAll('.tab')[tabIndex]);
  const resId = item.type + '-response';
  const res = document.getElementById(resId);
  if(res){
    const formatted = fmt(item.text);
    const withActions = addQuickActions(formatted);
    res.className = 'response-area visible';
    res.innerHTML = '<div class="response-content">' + withActions + '</div>' + buildActionBar(resId, item.text);
  }
}

function clearHistory(){
  if(!confirm(t('hist_confirm'))) return;
  localStorage.removeItem('mim_history');
  renderHistory();
  showNotify('🗑️ ' + (LANG==='uk'?'Історію очищено':'History cleared'));
}

// Override switchTab to render history when switching to it
const _origSwitchTab = switchTab;
switchTab = function(name, el){
  _origSwitchTab(name, el);
  if(name === 'history') renderHistory();
};
